appId: com.autogeo.app
productName: AutoGeo
copyright: Copyright © 2025 AutoGeo Team
directories:
  buildResources: build
  output: dist
files:
  - out/**/*
  - package.json
  # 排除devDependencies，只打包production dependencies
  - "!**/node_modules/*/{TEST,test,tests,__tests__,example,examples}/**"
  - "!**/node_modules/*.md"
  - "!**/node_modules/*.ts"
  - "!**/node_modules/*.map"
  # electron-builder 会自动打包 dependencies（从 package.json 读取）
  # 如果需要排除某些依赖，可以使用 ! 前缀
# 打包后端可执行文件和静态资源（PyInstaller打包，不需要用户安装Python）
extraResources:
  # 后端 exe（backend-manager.ts 从 process.resourcesPath/AutoGeoBackend.exe 读取）
  - from: ../backend/dist/AutoGeoBackend.exe
    to: AutoGeoBackend.exe
  # 前端静态文件（FastAPI 从 static 目录服务）
  - from: ../backend/static
    to: static
    filter:
      - '**/*'
      - '!**/uploads/**'  # 不打包上传文件目录
# 关闭 asar 打包，避免模块路径问题（实测这玩意儿是个坑）
asar: false
win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-v${version}-Setup.${ext}
  sign: null
  signingHashAlgorithms: []
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  deleteAppDataOnUninstall: false
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: AutoGeo
mac:
  target:
    - target: dmg
      arch:
        - x64
  category: public.app-category.productivity
  identity: null
  hardenedRuntime: false
  gatekeeperAssess: false
dmg:
  contents:
    - x: 130
      'y': 220
      type: file
      path: AutoGeo.app
    - x: 410
      'y': 220
      type: link
      path: /Applications
  window:
    width: 540
    height: 380
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: Utility
  synopsis: AI-powered multi-platform article publishing assistant
deb:
  priority: optional

# 备注（2026-02-26）：禁用publish功能（不需要自动更新）
# 如果需要启用自动更新，需要配置完整的Git仓库或添加repository字段到package.json
publish: null
