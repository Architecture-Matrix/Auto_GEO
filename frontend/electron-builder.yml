appId: com.autogeo.app
productName: AutoGeo
copyright: Copyright © 2025 AutoGeo Team
directories:
  buildResources: build
  output: dist
files:
  - out/**/*
  - package.json
  # electron-builder 会自动打包 dependencies（从 package.json 读取）
  # 如果需要排除某些依赖，可以使用 ! 前缀
extraResources:
  - from: ../backend
    to: backend
    filter:
      - '**/*'
      - '!**/__pycache__'
      - '!**/*.pyc'
      - '!**/.pytest_cache'
      - '!**/tests'
      - '!**/.git'
# 关闭 asar 打包，避免模块路径问题（老王我实测这玩意儿是个坑）
asar: false
win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-${version}-${os}-${arch}.${ext}
  sign: null
  signingHashAlgorithms: []
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  deleteAppDataOnUninstall: false
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: AutoGeo
mac:
  target:
    - target: dmg
      arch:
        - x64
  category: public.app-category.productivity
  identity: null
  hardenedRuntime: false
  gatekeeperAssess: false
dmg:
  contents:
    - x: 130
      'y': 220
      type: file
      path: AutoGeo.app
    - x: 410
      'y': 220
      type: link
      path: /Applications
  window:
    width: 540
    height: 380
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: Utility
  synopsis: AI-powered multi-platform article publishing assistant
deb:
  priority: optional
