name: Backend Deploy

on:
  push:
    branches: [main, master]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-deploy.yml'
  workflow_dispatch:
    inputs:
      deploy:
        description: '部署到服务器'
        required: true
        default: 'true'

env:
  PYTHON_VERSION: '3.12'
  REGISTRY: ghcr.io
  IMAGE_NAME: auto_geo_backend
  # 老王备注：Docker镜像名必须小写！
  REPO_OWNER_LOWER: architecture-matrix

jobs:
  # ============================================
  # 第一步：构建并推送 Docker 镜像
  # ============================================
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO_OWNER_LOWER }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha
          cache-to: type=gha,mode=max
          # 老王备注：压缩镜像层，加快拉取速度
          compression: zstd
          compression-level: 9
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}

  # ============================================
  # 第二步：部署到服务器
  # ============================================
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script_stop: false
          timeout: 1800s  # 老王备注：30分钟总超时
          command_timeout: 1800s  # 老王备注：单个命令30分钟超时
          script: |
            set -e

            echo "🚀 开始部署 AutoGeo 后端..."

            # 设置变量
            IMAGE_FULL="ghcr.io/architecture-matrix/auto_geo_backend:latest"
            CONTAINER_NAME="autogeo-backend"
            PORT="${{ secrets.BACKEND_PORT || 8001 }}"
            MAX_RETRIES=3  # 老王备注：最多重试3次
            RETRY_DELAY=10  # 老王备注：重试间隔10秒

            # 登录到 GHCR
            echo "🔐 登录到 GHCR..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # 检查服务器状态
            echo "📊 检查服务器状态..."
            echo "=== 磁盘空间 ==="
            df -h
            echo "=== Docker 版本 ==="
            docker version --format '{{.Server.Version}}'
            echo "=== 当前镜像列表 ==="
            docker images | grep auto_geo_backend || echo "无现有镜像"

            # ============================================
            # 新策略：先拉取新镜像，成功后再停止旧容器
            # 优点：减少停机时间，拉取失败不影响服务
            # ============================================

            echo ""
            echo "📦 第一步：拉取最新镜像（带重试机制）..."

            PULL_SUCCESS=0
            for attempt in $(seq 1 $MAX_RETRIES); do
              echo ""
              echo "=== 第 $attempt 次尝试拉取镜像 ==="
              echo "开始时间: $(date)"

              # 清理Docker系统缓存（老王备注：有时候缓存会坏）
              if [ $attempt -gt 1 ]; then
                echo "清理Docker缓存..."
                docker system prune -f --volumes || true
              fi

              # 拉取镜像（不设置timeout，让Docker自己处理）
              if docker pull $IMAGE_FULL 2>&1 | tee /tmp/pull.log; then
                PULL_SUCCESS=1
                echo "✅ 镜像拉取成功！"
                echo "结束时间: $(date)"

                # 显示镜像信息
                echo "=== 新镜像信息 ==="
                docker images $IMAGE_FULL --format "镜像ID: {{.ID}}\n创建时间: {{.Created}}\n大小: {{.Size}}"
                break
              else
                PULL_EXIT_CODE=${PIPESTATUS[0]}
                echo "❌ 第 $attempt 次拉取失败，退出码: $PULL_EXIT_CODE"
                echo "结束时间: $(date)"

                if [ $attempt -lt $MAX_RETRIES ]; then
                  echo "⏳ 等待 $RETRY_DELAY 秒后重试..."
                  sleep $RETRY_DELAY
                else
                  echo "❌ 已达到最大重试次数，放弃拉取"
                  echo ""
                  echo "=== 拉取日志（最后50行）==="
                  tail -50 /tmp/pull.log
                  exit 1
                fi
              fi
            done

            if [ $PULL_SUCCESS -ne 1 ]; then
              echo "❌ 镜像拉取最终失败"
              exit 1
            fi

            echo ""
            echo "⏹️  第二步：停止旧容器..."

            # 检查旧容器是否存在
            if [ "$(docker ps -aq -f name=$CONTAINER_NAME)" ]; then
                echo "发现旧容器，正在停止..."
                docker stop $CONTAINER_NAME || true
                docker rm $CONTAINER_NAME || true
                echo "✅ 旧容器已停止并删除"
            else
                echo "ℹ️  没有旧容器"
            fi

            echo ""
            echo "🗑️  第三步：删除旧镜像..."

            # 删除旧镜像（保留当前使用的）
            OLD_IMAGES=$(docker images $IMAGE_FULL --format "{{.ID}}" | tail -n +2)
            if [ -n "$OLD_IMAGES" ]; then
              echo "删除旧镜像: $OLD_IMAGES"
              echo $OLD_IMAGES | xargs docker rmi -f 2>/dev/null || echo "部分旧镜像删除失败，继续"
            fi

            echo ""
            echo "📁 第四步：准备数据目录..."

            mkdir -p ~/autogeo/data ~/autogeo/logs ~/autogeo/database ~/autogeo/cookies
            chmod -R 777 ~/autogeo
            echo "✅ 数据目录准备完成"

            echo ""
            echo "🚀 第五步：启动新容器..."

            # 先删除可能存在的同名容器（防止名称冲突）
            docker rm -f $CONTAINER_NAME 2>/dev/null || true

            CONTAINER_ID=$(docker run -d \
              --name $CONTAINER_NAME \
              --restart unless-stopped \
              -p $PORT:8001 \
              -v ~/autogeo/data:/app/data \
              -v ~/autogeo/logs:/app/logs \
              -v ~/autogeo/database:/app/backend/database \
              -v ~/autogeo/cookies:/app/.cookies \
              -e ENVIRONMENT=production \
              -e HOST=0.0.0.0 \
              -e PYTHONUNBUFFERED=1 \
              -e N8N_BASE_URL=https://n8n.opencaio.cn \
              -e RAGFLOW_BASE_URL=https://ragflow.xinzhixietong.com \
              --health-cmd="curl -f http://localhost:8001/api/health || exit 1" \
              --health-interval=30s \
              --health-timeout=10s \
              --health-retries=3 \
              $IMAGE_FULL)

            echo "✅ 容器已启动，ID: $CONTAINER_ID"

            echo ""
            echo "🔍 第六步：检查容器状态..."

            sleep 5
            CONTAINER_STATUS=$(docker inspect -f '{{.State.Status}}' $CONTAINER_NAME 2>/dev/null || echo "not_found")
            echo "容器状态: $CONTAINER_STATUS"

            if [ "$CONTAINER_STATUS" = "exited" ]; then
                echo "❌ 容器启动后立即退出！"
                echo "=== 容器日志 ==="
                docker logs $CONTAINER_NAME --tail 100
                exit 1
            fi

            echo ""
            echo "⏳ 第七步：等待服务就绪..."

            READY=0
            for i in {1..24}; do
                sleep 5
                if curl -f http://localhost:$PORT/api/health > /dev/null 2>&1; then
                    READY=1
                    echo "✅ 服务已就绪！"
                    break
                fi
                CONTAINER_STATUS=$(docker inspect -f '{{.State.Status}}' $CONTAINER_NAME 2>/dev/null || echo "not_found")
                if [ "$CONTAINER_STATUS" = "exited" ]; then
                    echo "❌ 容器在启动过程中退出！"
                    echo "=== 容器日志 ==="
                    docker logs $CONTAINER_NAME --tail 100
                    exit 1
                fi
                echo "等待中... ($i/24, 已等待 $((i*5))秒)"
            done

            if [ $READY -ne 1 ]; then
                echo "❌ 服务启动超时"
                echo "=== 容器状态 ==="
                docker ps -a | grep $CONTAINER_NAME
                echo "=== 容器日志 ==="
                docker logs $CONTAINER_NAME --tail 100
                exit 1
            fi

            echo ""
            echo "🎉 部署成功！"
            echo "📍 API 地址: http://$(hostname -I | awk '{print $1}'):$PORT"
            echo "📊 API 文档: http://$(hostname -I | awk '{print $1}'):$PORT/docs"
            echo "🔍 健康检查: http://$(hostname -I | awk '{print $1}'):$PORT/api/health"

      - name: Deployment Summary
        if: success()
        run: |
          echo "### 🎉 后端部署成功！" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **镜像**: ghcr.io/architecture-matrix/auto_geo_backend:latest" >> $GITHUB_STEP_SUMMARY
          echo "- **服务器**: ${{ secrets.SERVER_HOST }}" >> $GITHUB_STEP_SUMMARY
          echo "- **端口**: ${{ secrets.BACKEND_PORT || 8001 }}" >> $GITHUB_STEP_SUMMARY
          echo "- **API**: http://${{ secrets.SERVER_HOST }}:${{ secrets.BACKEND_PORT || 8001 }}" >> $GITHUB_STEP_SUMMARY
